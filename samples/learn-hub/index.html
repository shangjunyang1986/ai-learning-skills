<!DOCTYPE html>
<!--learn-hub: generated by skills/learn/scripts/build-hub.py — do not index this file-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>我的学习库 · Learning Library</title>
<style>
  :root{
    --bg:#0f1117; --bg2:#161922; --panel:#1b1f2a; --panel2:#212636;
    --line:#2a3042; --txt:#e6e8ee; --muted:#9aa3b5; --dim:#717b90;
    --accent:#7c5cff; --accent2:#22d3ee; --amber:#f5b94d; --green:#46c98b; --pink:#ff7eb6;
    --gh:#7c5cff; --domain:#22d3ee; --book:#46c98b; --paper:#f5b94d; --other:#9aa3b5;
    --maxw:1240px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.65;font-size:15px}
  a{color:var(--accent2);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:40px 28px 100px}

  header.top{background:radial-gradient(120% 140% at 0% 0%,rgba(124,92,255,.22),transparent 50%),radial-gradient(120% 140% at 100% 0%,rgba(34,211,238,.14),transparent 45%),var(--panel);
    border:1px solid var(--line);border-radius:18px;padding:28px 30px;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:13px}
  .brand .logo{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#fff;flex:0 0 44px}
  .brand h1{font-size:22px;margin:0;line-height:1.2}
  .brand p{margin:3px 0 0;font-size:13px;color:var(--muted)}
  .stats{display:flex;flex-wrap:wrap;gap:11px;margin-top:18px}
  .stat{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:9px 15px;min-width:96px}
  .stat b{display:block;font-size:19px;color:#fff;font-variant-numeric:tabular-nums}
  .stat span{font-size:11.5px;color:var(--muted)}
  .stat.prog b{color:var(--green)}

  .toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:0 0 18px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .fchip{cursor:pointer;font-size:13px;padding:6px 13px;border-radius:9px;background:var(--bg2);border:1px solid var(--line);color:var(--muted);user-select:none}
  .fchip:hover{color:#fff;border-color:var(--accent)}
  .fchip.on{background:linear-gradient(90deg,rgba(124,92,255,.2),rgba(34,211,238,.07));color:#fff;border-color:#3a3560}
  .fchip .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .search{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:10px 15px;font-size:14px}
  .search:focus{outline:none;border-color:var(--accent)}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:1000px){.grid{grid-template-columns:1fr 1fr}}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}
  .lcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:transform .14s,border-color .14s}
  .lcard:hover{transform:translateY(-3px);border-color:var(--accent)}
  .lcard .thumb{aspect-ratio:16/10;background:#0d0f16;position:relative;overflow:hidden;display:block}
  .lcard .thumb img{width:100%;height:100%;object-fit:cover;display:block;background:#fff}
  .lcard .thumb .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:800;color:rgba(255,255,255,.85)}
  .lcard .badge{position:absolute;top:9px;left:9px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:7px;color:#0d0f16}
  .b-gh{background:var(--gh);color:#fff} .b-domain{background:var(--domain)} .b-book{background:var(--book)} .b-paper{background:var(--paper)} .b-other{background:var(--other)}
  .lcard .body{padding:13px 15px 14px;display:flex;flex-direction:column;flex:1}
  .lcard .ltitle{font-size:14.5px;font-weight:600;color:#fff;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:40px}
  .lcard .lsrc{font-size:12px;color:var(--muted);margin-top:5px;min-height:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lrow{display:flex;align-items:center;gap:8px;margin-top:12px}
  .status{display:flex;gap:4px}
  .sbtn{cursor:pointer;font-size:11px;padding:3px 8px;border-radius:7px;background:var(--bg2);border:1px solid var(--line);color:var(--dim);user-select:none}
  .sbtn:hover{color:#fff}
  .sbtn.on-todo{border-color:var(--dim);color:#cdd4e2}
  .sbtn.on-doing{background:rgba(245,185,77,.16);border-color:#5a4a23;color:#f5d49a}
  .sbtn.on-done{background:rgba(70,201,139,.16);border-color:#1f5a44;color:#9fe9c4}
  .openbtn{margin-left:auto;font-size:12.5px;font-weight:600;color:var(--accent2);padding:5px 11px;border:1px solid var(--line);border-radius:8px}
  .openbtn:hover{border-color:var(--accent2);text-decoration:none}
  .empty{color:var(--dim);padding:40px 0;text-align:center}
  footer{margin-top:34px;padding-top:16px;border-top:1px solid var(--line);color:var(--dim);font-size:12.5px}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="logo">📚</div>
      <div><h1 id="hubTitle">我的学习库</h1><p>由 <code>ai-learning-skills</code> 家族生成的离线学习页，集中在这里随时翻看 · 学习状态存在本地</p></div>
    </div>
    <div class="stats">
      <div class="stat"><b id="stTotal">0</b><span>学习页</span></div>
      <div class="stat"><b id="stTypes">0</b><span>来源类型</span></div>
      <div class="stat prog"><b id="stDone">0</b><span>已学完</span></div>
    </div>
  </header>

  <div class="toolbar">
    <div class="chips" id="fchips"></div>
    <input class="search" id="q" placeholder="🔍 搜索标题 / 来源…" oninput="render()">
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    生成于 <span id="genDate">—</span> · 共 <span id="footTotal">0</span> 页 · 学习状态(未开始 / 在学 / 学完)仅存于本浏览器(localStorage)。
    用 <code>/learn</code> 继续生成新的学习页，或重跑 <code>build-hub.py</code> 刷新本页。
  </footer>
</div>

<script>
const LIBRARY = [{"id": "../github-project-learn/om-ai-lab-learn", "title": "Om AI Lab 学习手册 · 重点：OmAgent", "type": "github-project-learn", "source": "Om AI Lab", "href": "../github-project-learn/om-ai-lab-learn/index.html", "thumb": "../github-project-learn/om-ai-lab-learn/assets/omagent-app.png"}, {"id": "../github-project-learn/whisper-learn", "title": "OpenAI Whisper 学习手册 · 离线版", "type": "github-project-learn", "source": "OpenAI Whisper", "href": "../github-project-learn/whisper-learn/index.html", "thumb": "../github-project-learn/whisper-learn/assets/approach.png"}, {"id": "../github-project-learn/qwenlm-learn", "title": "Qwen (通义千问) 学习手册 · 重点：Qwen-Agent", "type": "github-project-learn", "source": "Qwen (通义千问)", "href": "../github-project-learn/qwenlm-learn/index.html", "thumb": "../github-project-learn/qwenlm-learn/assets/qa-logo.png"}, {"id": "../domain-learn/3dgs-learn", "title": "3D 高斯泼溅 (3DGS) 学习手册", "type": "domain-learn", "source": "3D 高斯泼溅 (3DGS)", "href": "../domain-learn/3dgs-learn/index.html", "thumb": "../domain-learn/3dgs-learn/assets/gs-aa.gif"}, {"id": "../domain-learn/diffusion-models-learn", "title": "扩散模型 (Diffusion Models) 学习手册", "type": "domain-learn", "source": "扩散模型 (Diffusion Models)", "href": "../domain-learn/diffusion-models-learn/index.html", "thumb": "../domain-learn/diffusion-models-learn/assets/dm-algo.png"}, {"id": "../textbook-learn/d2l-learn", "title": "《动手学深度学习》(d2l.ai) 学习手册 · 逐章精讲 + 主动回忆", "type": "textbook-learn", "source": "《动手学深度学习》(d2l.ai)", "href": "../textbook-learn/d2l-learn/index.html", "thumb": "../textbook-learn/d2l-learn/assets/cover.png"}, {"id": "../paper-learn/attention-learn", "title": "论文精读 · Attention Is All You Need (Transformer)", "type": "paper-learn", "source": "论文", "href": "../paper-learn/attention-learn/index.html", "thumb": "../paper-learn/attention-learn/assets/fig1-architecture.png"}];
const GEN_DATE = "2026-06-28";
const HUB_TITLE = "ai-learning-skills 学习库（样例）";

const TYPE_META = {
  'github-project-learn':{label:'GitHub 项目',cls:'gh',color:'var(--gh)'},
  'domain-learn':{label:'开放领域',cls:'domain',color:'var(--domain)'},
  'textbook-learn':{label:'技术书',cls:'book',color:'var(--book)'},
  'paper-learn':{label:'论文',cls:'paper',color:'var(--paper)'},
  'other':{label:'其它',cls:'other',color:'var(--other)'},
};
const KEY='learn-hub-status-v1';
let status={};
try{status=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){}
function saveStatus(){try{localStorage.setItem(KEY,JSON.stringify(status))}catch(e){}}
let activeType='all';

function setStatus(id,st){status[id]=st;saveStatus();render()}
function cycle(id){const order=['todo','doing','done'];const cur=status[id]||'todo';setStatus(id,order[(order.indexOf(cur)+1)%3])}

function card(e){
  const tm=TYPE_META[e.type]||TYPE_META.other;
  const st=status[e.id]||'todo';
  const thumb=e.thumb
    ? `<img src="${e.thumb}" alt="" loading="lazy" onerror="this.style.display='none';this.parentNode.querySelector('.ph').style.display='flex'">
       <div class="ph" style="display:none;background:linear-gradient(135deg,${tm.color},#0d0f16)">${(e.title||'?').trim().charAt(0)}</div>`
    : `<div class="ph" style="display:flex;background:linear-gradient(135deg,${tm.color},#0d0f16)">${(e.title||'?').trim().charAt(0)}</div>`;
  const lbl={todo:'未开始',doing:'在学',done:'学完'};
  return `<div class="lcard">
    <a class="thumb" href="${e.href}">${thumb}<span class="badge b-${tm.cls}">${tm.label}</span></a>
    <div class="body">
      <div class="ltitle">${e.title||e.id}</div>
      <div class="lsrc">${e.source||''}</div>
      <div class="lrow">
        <div class="status">
          <span class="sbtn ${st==='todo'?'on-todo':''}" onclick="setStatus('${e.id}','todo')">未开始</span>
          <span class="sbtn ${st==='doing'?'on-doing':''}" onclick="setStatus('${e.id}','doing')">在学</span>
          <span class="sbtn ${st==='done'?'on-done':''}" onclick="setStatus('${e.id}','done')">学完</span>
        </div>
        <a class="openbtn" href="${e.href}">打开 →</a>
      </div>
    </div>
  </div>`;
}

function render(){
  const q=(document.getElementById('q').value||'').trim().toLowerCase();
  let list=LIBRARY.filter(e=>activeType==='all'||e.type===activeType);
  if(q) list=list.filter(e=>((e.title||'')+(e.source||'')+(e.id||'')).toLowerCase().includes(q));
  const g=document.getElementById('grid');
  g.innerHTML=list.length?list.map(card).join(''):'<div class="empty">没有匹配的学习页</div>';
  const done=LIBRARY.filter(e=>status[e.id]==='done').length;
  document.getElementById('stDone').textContent=done;
}

function buildChips(){
  const present=[...new Set(LIBRARY.map(e=>e.type))];
  const order=['github-project-learn','domain-learn','textbook-learn','paper-learn','other'];
  present.sort((a,b)=>order.indexOf(a)-order.indexOf(b));
  const chips=[{t:'all',label:'全部 ('+LIBRARY.length+')'}].concat(present.map(t=>{
    const tm=TYPE_META[t]||TYPE_META.other;const n=LIBRARY.filter(e=>e.type===t).length;
    return {t,label:tm.label+' ('+n+')',color:tm.color};
  }));
  document.getElementById('fchips').innerHTML=chips.map(c=>
    `<span class="fchip ${c.t==='all'?'on':''}" data-t="${c.t}" onclick="pickType('${c.t}')">${c.color?`<span class="dot" style="background:${c.color}"></span>`:''}${c.label}</span>`
  ).join('');
}
function pickType(t){activeType=t;document.querySelectorAll('.fchip').forEach(c=>c.classList.toggle('on',c.dataset.t===t));render()}

document.getElementById('hubTitle').textContent=HUB_TITLE||'我的学习库';
document.title=(HUB_TITLE||'我的学习库')+' · Learning Library';
document.getElementById('stTotal').textContent=LIBRARY.length;
document.getElementById('footTotal').textContent=LIBRARY.length;
document.getElementById('stTypes').textContent=new Set(LIBRARY.map(e=>e.type)).size;
document.getElementById('genDate').textContent=GEN_DATE||'—';
buildChips();render();
</script>
</body>
</html>
